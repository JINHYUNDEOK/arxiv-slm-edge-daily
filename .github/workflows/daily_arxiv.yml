name: Daily arXiv SLM & Edge Digest

on:
  schedule:
    # Runs every day at 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-papers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily arXiv script
        run: python scripts/daily_arxiv.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/ processed_ids.json
          # Only commit when there are actual changes
          if git diff --cached --quiet; then
            echo "No new papers today — nothing to commit."
          else
            git commit -m "chore: daily arXiv digest $(date -u +'%Y-%m-%d')"
            git push
          fi
