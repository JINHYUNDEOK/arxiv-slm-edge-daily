name: Daily SLM Edge arXiv Summary

on:
  schedule:
    # KST 오전 9시 37분 = UTC 0시 37분
    # 정각에는 arXiv와 GitHub Actions 양쪽 요청이 몰릴 수 있어 조금 늦게 실행
    - cron: "37 0 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/daily_arxiv.yml"
      - "scripts/daily_arxiv.py"
  workflow_dispatch:

concurrency:
  group: daily-arxiv
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run-daily-arxiv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Korean fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run arXiv summary script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          OUTPUT_DIR: outputs
          ARXIV_MAX_RESULTS: 100
          ARXIV_RETRIES: 5
          ARXIV_BASE_SLEEP_SEC: 90
          ARXIV_INITIAL_JITTER_SEC: 180
        run: python scripts/daily_arxiv.py

      - name: Commit generated outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add outputs processed_ids.json
          git commit -m "Add daily arXiv summary" || echo "No changes to commit"
          git push
