name: Daily SLM Edge arXiv Summary

on:
  schedule:
    # KST 오전 5시 = UTC 전날 20시
    # arXiv 임시 오류가 나면 workflow 내부에서 KST 오전 10시까지 15~30분 랜덤 간격으로 재시도
    # Manual trigger marker: 2026-05-17
    - cron: "0 20 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/daily_arxiv.yml"
      - "scripts/daily_arxiv.py"
  workflow_dispatch:

concurrency:
  group: daily-arxiv
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run-daily-arxiv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Korean fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run arXiv summary script with retry window
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          OUTPUT_DIR: outputs
          ARXIV_MAX_RESULTS: 100
          ARXIV_RETRIES: 1
          ARXIV_BASE_SLEEP_SEC: 30
          ARXIV_INITIAL_JITTER_SEC: 0
          ARXIV_QUERY_PAUSE_SEC: 7
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "schedule" ]; then
            deadline_epoch=$(TZ=Asia/Seoul date -d "$(TZ=Asia/Seoul date +%F) 10:00" +%s)
            echo "Scheduled run retry deadline: 10:00 KST."
          else
            deadline_epoch=$(( $(TZ=Asia/Seoul date +%s) + 14400 ))
            echo "Manual/push run retry deadline: 4 hours from now."
          fi
          attempt=1

          while true; do
            today_kst=$(TZ=Asia/Seoul date +%Y%m%d)
            output_file="${OUTPUT_DIR}/${today_kst}.pdf"

            echo "Attempt ${attempt}: target output ${output_file}"

            set +e
            python scripts/daily_arxiv.py
            exit_code=$?
            set -e

            if [ "${exit_code}" -eq 0 ]; then
              echo "Script completed successfully."
              break
            fi

            if [ "${exit_code}" -ne 75 ]; then
              echo "Script failed with non-retryable exit code ${exit_code}."
              exit "${exit_code}"
            fi

            now_epoch=$(TZ=Asia/Seoul date +%s)
            if [ "${now_epoch}" -ge "${deadline_epoch}" ]; then
              echo "arXiv temporary error persisted until the 10:00 KST retry deadline. Failing the workflow."
              exit 75
            fi

            wait_sec=$((900 + RANDOM % 901))
            next_epoch=$((now_epoch + wait_sec))
            if [ "${next_epoch}" -gt "${deadline_epoch}" ]; then
              wait_sec=$((deadline_epoch - now_epoch))
            fi

            echo "arXiv temporary error. Waiting ${wait_sec} seconds before retrying."
            sleep "${wait_sec}"
            attempt=$((attempt + 1))
          done

      - name: Commit generated outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add outputs processed_ids.json
          git commit -m "Add daily arXiv summary" || echo "No changes to commit"
          git push
