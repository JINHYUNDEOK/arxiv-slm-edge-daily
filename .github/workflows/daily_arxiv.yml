name: Daily SLM Edge arXiv Summary

on:
  schedule:
    # KST 오전 9시 = UTC 0시
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: daily-arxiv
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run-daily-arxiv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Korean fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run arXiv summary script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          OUTPUT_DIR: outputs
        run: python scripts/daily_arxiv.py

      - name: Commit generated outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add outputs processed_ids.json
          git commit -m "Add daily arXiv summary" || echo "No changes to commit"
          git push
